      <stop offset="0%" stop-color="#081226"/>
      <stop offset="100%" stop-color="#10284D"/>
    </linearGradient>
  </defs>
  <rect width="640" height="360" rx="12" fill="url(#geq)"/>
  <rect x="12" y="12" width="616" height="336" rx="10" fill="#0E1D3D" stroke="#43EFFF" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="320" y="38" fill="#6BE8FF" font-size="15" font-family="Orbitron, Arial, sans-serif" text-anchor="middle">EQUAÇĂO · Os dois lados permanecem iguais</text>
  <!-- Balance metaphor -->
  <line x1="320" y1="120" x2="320" y2="260" stroke="#E8E8E8" stroke-width="3"/>
  <line x1="140" y1="120" x2="500" y2="120" stroke="#E8E8E8" stroke-width="3" stroke-linecap="round"/>
