<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <linearGradient id="meq" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#081226"/>
      <stop offset="100%" stop-color="#10284D"/>
    </linearGradient>
    <pattern id="megrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" stroke="#43EFFF" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="640" height="360" rx="12" fill="url(#meq)"/>
  <rect x="12" y="12" width="616" height="336" rx="10" fill="url(#megrid)" stroke="#43EFFF" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="320" y="34" fill="#6BE8FF" font-size="13" font-family="Orbitron, Arial, sans-serif" text-anchor="middle">EQUACAO: mesma operacao nos dois lados</text>
  <line x1="320" y1="115" x2="320" y2="255" stroke="#E8E8E8" stroke-width="3"/>
  <line x1="140" y1="115" x2="500" y2="115" stroke="#E8E8E8" stroke-width="3" stroke-linecap="round"/>
  <rect x="120" y="128" width="180" height="100" rx="8" fill="#10284D" stroke="#9F7BFF" stroke-opacity="0.6" stroke-width="2"/>
  <rect x="340" y="128" width="180" height="100" rx="8" fill="#10284D" stroke="#6BE8FF" stroke-opacity="0.6" stroke-width="2"/>
  <text x="210" y="180" fill="#E8E8E8" font-size="18" font-family="Inter, Arial, sans-serif" text-anchor="middle">5x + 9</text>
  <text x="430" y="180" fill="#E8E8E8" font-size="18" font-family="Inter, Arial, sans-serif" text-anchor="middle">2x - 3</text>
  <text x="210" y="208" fill="#B393FF" font-size="12" font-family="Inter, Arial, sans-serif" text-anchor="middle">esquerda</text>
  <text x="430" y="208" fill="#B393FF" font-size="12" font-family="Inter, Arial, sans-serif" text-anchor="middle">direita</text>
  <text x="320" y="285" fill="#888" font-size="12" font-family="Inter, Arial, sans-serif" text-anchor="middle">Exemplo: 5x + 9 = 2x - 3</text>
  <text x="320" y="318" fill="#666" font-size="11" font-family="Inter, Arial, sans-serif" text-anchor="middle">Isolar x com passos iguais em cada lado</text>
