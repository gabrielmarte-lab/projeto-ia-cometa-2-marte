  <rect x="340" y="130" width="180" height="100" rx="8" fill="#10284D" stroke="#6BE8FF" stroke-opacity="0.6" stroke-width="2"/>
  <text x="210" y="175" fill="#E8E8E8" font-size="18" font-family="Inter, Arial, sans-serif" text-anchor="middle">5x + 9</text>
  <text x="430" y="175" fill="#E8E8E8" font-size="18" font-family="Inter, Arial, sans-serif" text-anchor="middle">2x  3</text>
  <text x="210" y="205" fill="#B393FF" font-size="12" font-family="Inter, Arial, sans-serif" text-anchor="middle">lado esquerdo</text>
